<div class="container-fluid">

  <div class="row m-0">
    <div class="col-3">
      <div class="pr-1" style="    width: 95%;height: 560px; overflow: scroll;">
        <ds-item-page-file-section *ngIf="itemTab" [isBlank]="isBlank" [item]="itemTab"></ds-item-page-file-section>

      </div>

    </div>

    <div class="col-9 mb-2 " >
      <div class="body">
        <ng-container>
          <div style='width: 100%; height: 88vh' >
            <!-- <h5>{{bistremobj?.name}}</h5> -->
            <ng2-pdfjs-viewer #pdfViewer  [download]="false" [print]="false" [openFile]="false"
          [fullScreen]="false"[viewBookmark]="false" [showSpinner]="true" >
            </ng2-pdfjs-viewer>
          </div>

        </ng-container>
      </div>
    </div>


  </div>
</div>
